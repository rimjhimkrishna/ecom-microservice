spring:
  datasource:
    url: jdbc:h2:mem:product_db_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  cache:
    type: none
eureka:
  client:
    enabled: false
